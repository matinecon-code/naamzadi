<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دعوت بله برون</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f8f4ea;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:tahoma;
}

.container{
position:relative;
width:430px;
max-width:95vw;
height:760px;
display:flex;
justify-content:center;
align-items:center;
}

/* پاکت */

.envelope{
position:absolute;
width:92%;
cursor:pointer;
z-index:10;
transition:1.2s ease;
}

.envelope img{
width:100%;
display:block;
}

/* کارت */

.card{
position:absolute;
width:88%;
opacity:0;
transform:translateY(220px) scale(.88);
transition:all 2s ease;
z-index:1;
}

.card img{
width:100%;
display:block;
border-radius:22px;
box-shadow:
0 15px 40px rgba(0,0,0,.15),
0 0 30px rgba(212,175,55,.12);
}

/* باز شدن */

.open .envelope{
opacity:0;
pointer-events:none;
transform:scale(.9);
}

.open .card{
opacity:1;
transform:translateY(-35px) scale(1);
z-index:20;
}

/* ناحیه کلیک روی آیکون لوکیشن داخل تصویر */

.location-link{

position:absolute;

/* محل دقیق آیکون لوکیشن روی کارت */
right:68px;
bottom:185px;

width:30px;
height:30px;

z-index:100;

cursor:pointer;

background:transparent;

border-radius:50%;

opacity:0;

}

.open .location-link{
opacity:1;
}

/* درخشش طلایی روی همان آیکون */

.location-link::after{

content:"";

position:absolute;

top:50%;
left:50%;

width:18px;
height:18px;

transform:translate(-50%,-50%);

border-radius:50%;

box-shadow:
0 0 6px rgba(255,215,90,.9),
0 0 12px rgba(212,165,40,.7);

animation:locationGlow 2s ease-in-out infinite;

pointer-events:none;

}

@keyframes locationGlow{

0%{
opacity:.55;
}

50%{
opacity:1;
}

100%{
opacity:.55;
}

}

/* ذرات طلایی */

.sparkle{
position:absolute;
width:6px;
height:6px;
background:#e7c567;
border-radius:50%;
animation:float 4s linear infinite;
}

@keyframes float{

0%{
opacity:0;
transform:translateY(0);
}

50%{
opacity:1;
}

100%{
opacity:0;
transform:translateY(-250px);
}

}

</style>
</head>

<body>

<div class="container" id="container">

<div class="envelope" id="envelope">
<img src="envelope.png" alt="پاکت دعوت">
</div>

<div class="card">

<img src="card.png" alt="کارت دعوت">

<a
class="location-link"
href="https://nshn.ir/6a_bvsokWx41T1"
target="_blank"
title="مشاهده لوکیشن مراسم">
</a>

</div>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const envelope =
document.getElementById("envelope");

const container =
document.getElementById("container");

const music =
document.getElementById("music");

envelope.addEventListener(
"click",
async ()=>{

container.classList.add("open");

try{

music.currentTime = 2;

await music.play();

}catch(error){

console.log(error);

}

createSparkles();

}
);

music.addEventListener(
"timeupdate",
()=>{

if(music.currentTime >= 20){

music.currentTime = 2;

music.play();

}

}
);

function createSparkles(){

for(let i=0;i<40;i++){

let s =
document.createElement("div");

s.className="sparkle";

s.style.left =
Math.random()*430+"px";

s.style.bottom =
Math.random()*120+"px";

s.style.animationDelay =
Math.random()*3+"s";

container.appendChild(s);

}

}

</script>

</body>
</html>
