<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دعوت بله برون</title>
<style>
body{margin:0;background:#f7f0e3;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:tahoma}
.wrap{text-align:center;max-width:500px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#envelope{width:100%;cursor:pointer;transition:all 1.2s}
#card{width:100%;display:none;opacity:0;transform:translateY(250px);transition:all 2s}
#card{width:100%;display:none;opacity:0;transition:all 2s;}
.open #card{display:block;opacity:1;}
.open #envelope{display:none;}
.open #card{display:block;opacity:1;transform:translateY(0)}
.loc{display:none;margin-top:10px}
.open .loc{display:block}
a{text-decoration:none;color:#8a6a1f}
</style>
</head>
<body>
<div class="wrap" id="wrap">
<img id="envelope" src="envelope.png">
<img id="card" src="card.png">
<div class="loc">
<a href="https://nshn.ir/6a_bvsokWx41T1" target="_blank">📍 سعادت آباد، بلوار دریا، بعد از پاکنژاد، شکوفان ۲، بهاران ۱، پلاک ۲۰۳، طبقه ۳</a>
</div>
<audio id="music" preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
</div>
<script>
const wrap = document.getElementById('wrap');
const env = document.getElementById('envelope');
const music = document.getElementById('music');

env.addEventListener('click', async () => {

    wrap.classList.add('open');

    try {
        music.currentTime = 2;
        await music.play();
    } catch(err) {
        console.log("Audio error:", err);
    }

});

music.addEventListener('timeupdate', () => {

    if (music.currentTime >= 20) {

        music.pause();
        music.currentTime = 2;
        music.play();

    }

});
</script>
</body>
</html>
