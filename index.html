<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوت بله برون</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f7f0e3;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:tahoma;
}

.container{
position:relative;
width:420px;
max-width:95vw;
height:720px;
display:flex;
justify-content:center;
align-items:center;
}

/* پاکت */

.envelope{
position:absolute;
width:100%;
cursor:pointer;
z-index:5;
transition:1s;
}

.envelope img{
width:100%;
display:block;
}

/* کارت */

.card{
position:absolute;
width:92%;
opacity:0;
transform:translateY(250px) scale(.9);
transition:2s;
z-index:1;
}

.card img{
width:100%;
display:block;
border-radius:22px;
box-shadow:0 15px 40px rgba(0,0,0,.18);
}

/* دکمه لوکیشن */

.location{
position:absolute;
bottom:28px;
left:50%;
transform:translateX(-50%);
background:#c89c3c;
color:white;
padding:10px 18px;
border-radius:50px;
text-decoration:none;
font-size:14px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
display:none;
}

/* وضعیت باز */

.open .envelope{
opacity:0;
pointer-events:none;
transform:scale(.9);
}

.open .card{
opacity:1;
transform:translateY(0) scale(1);
z-index:10;
}

.open .location{
display:block;
}

/* درخشش */

.sparkle{
position:absolute;
width:6px;
height:6px;
background:#ffd46b;
border-radius:50%;
animation:float 4s infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-250px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container" id="container">

<div class="envelope" id="envelope">
<img src="envelope.png">
</div>

<div class="card" id="card">
<img src="card.png">

<a class="location"
href="https://nshn.ir/6a_bvsokWx41T1"
target="_blank">
📍 مشاهده مسیر در نشان
</a>

</div>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const envelope = document.getElementById("envelope");
const container = document.getElementById("container");
const music = document.getElementById("music");

envelope.addEventListener("click", async ()=>{

container.classList.add("open");

try{
music.currentTime = 2;
await music.play();
}catch(err){
console.log(err);
}

createSparkles();

});

music.addEventListener("timeupdate", ()=>{

if(music.currentTime >= 20){

music.currentTime = 2;
music.play();

}

});

function createSparkles(){

for(let i=0;i<40;i++){

let s = document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*400+"px";

s.style.bottom=Math.random()*100+"px";

s.style.animationDelay=Math.random()*2+"s";

container.appendChild(s);

}

}

</script>

</body>
</html>
