<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دعوت بله برون</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f7f0e3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:tahoma;
}

.container{
position:relative;
width:430px;
max-width:95vw;
height:760px;
display:flex;
justify-content:center;
align-items:center;
}

/* پاکت */

.envelope{
position:absolute;
width:100%;
cursor:pointer;
z-index:10;
transition:1.2s;
}

.envelope img{
width:100%;
display:block;
}

/* کارت */

.card{
position:absolute;
width:92%;
opacity:0;
transform:translateY(250px) scale(.85);
transition:all 2s ease;
z-index:1;
}

.card img{
width:100%;
display:block;
border-radius:22px;
box-shadow:
0 15px 40px rgba(0,0,0,.18),
0 0 30px rgba(212,175,55,.15);
}

/* باز شدن */

.open .envelope{
opacity:0;
pointer-events:none;
transform:scale(.9);
}

.open .card{
opacity:1;
transform:translateY(0) scale(1);
z-index:20;
}

/* آیکون لوکیشن */

.location-icon-btn{

position:absolute;

right:42px;
bottom:150px;

width:40px;
height:40px;

display:flex;
align-items:center;
justify-content:center;

text-decoration:none;

z-index:50;

opacity:0;

transition:.6s ease;

}

.open .location-icon-btn{

opacity:1;

}

.location-icon-btn svg{

filter:
drop-shadow(0 0 4px rgba(255,215,90,.9))
drop-shadow(0 0 10px rgba(212,165,40,.5));

}

.location-icon-btn:hover{

transform:scale(1.15);

}

/* ذرات طلایی */

.sparkle{

position:absolute;

width:6px;
height:6px;

background:#f5cf6d;

border-radius:50%;

animation:float 4s linear infinite;

}

@keyframes float{

0%{
opacity:0;
transform:translateY(0);
}

50%{
opacity:1;
}

100%{
opacity:0;
transform:translateY(-250px);
}

}

</style>
</head>

<body>

<div class="container" id="container">

<div class="envelope" id="envelope">
<img src="envelope.png" alt="">
</div>

<div class="card">

<img src="card.png" alt="">

<a
class="location-icon-btn"
href="https://nshn.ir/6a_bvsokWx41T1"
target="_blank"
title="لوکیشن مراسم">

<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
width="34"
height="34">

<defs>

<linearGradient
id="goldGradient"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#f7d774"/>
<stop offset="50%" stop-color="#d8a93c"/>
<stop offset="100%" stop-color="#b9851b"/>

</linearGradient>

</defs>

<path
fill="url(#goldGradient)"
d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/>

</svg>

</a>

</div>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const envelope =
document.getElementById("envelope");

const container =
document.getElementById("container");

const music =
document.getElementById("music");

envelope.addEventListener(
"click",
async ()=>{

container.classList.add("open");

try{

music.currentTime=2;

await music.play();

}catch(error){

console.log(error);

}

createSparkles();

}
);

music.addEventListener(
"timeupdate",
()=>{

if(music.currentTime>=20){

music.currentTime=2;

music.play();

}

}
);

function createSparkles(){

for(let i=0;i<40;i++){

let s =
document.createElement("div");

s.className="sparkle";

s.style.left=
Math.random()*430+"px";

s.style.bottom=
Math.random()*120+"px";

s.style.animationDelay=
Math.random()*3+"s";

container.appendChild(s);

}

}

</script>

</body>
</html>
